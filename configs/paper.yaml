# Published experimental protocol (Information Fusion 2026, doi:10.1016/j.inffus.2026.104517).
# This file documents the exact setup used in the paper. It is a human/reviewer
# reference manifest; the CLI defaults in dacaf_mlc/{config,datasets,pipeline}.py
# already encode the same values.

model:
  type: PCC                      # Probabilistic Classifier Chains
  base_estimator: LogisticRegression
  base_estimator_params:
    penalty: l2                  # default; strictly-concave regularised CLL
    max_iter: 5_000_000
  inference: exact               # enumerate all 2^L labelings (exact computation paradigm)

cross_validation:
  scheme: KFold
  n_splits: 10
  shuffle: true
  feature_scaling: StandardScaler   # fit on the training fold only (no leakage)
  seeds: [1, 2, 3, 4, 5]            # results are averaged over seeds

# The 7 metrics reported in the paper (used as both target and evaluation).
metrics: [F1, Hamming, Markedness, Precision, NPV, Recall, Subset]

datasets:
  tabular:                       # L <= 14, exact enumeration tractable
    - {name: emotions,      L: 6,  N: 593}
    - {name: CHD_49,        L: 6,  N: 555}
    - {name: scene,         L: 6,  N: 2407}
    - {name: Water-quality, L: 14, N: 1060}
    - {name: yeast,         L: 14, N: 2417}
  image:
    - {name: ChestX-ray8, L: 8, N: 25596,
       feature_extractors: [resnet, resnetae, densenet]}   # via TorchXRayVision
